plugins {
    id 'java-library'
}

group = 'com.insurance.testsupport'
version = '0.0.1-SNAPSHOT'

repositories {
    mavenCentral()
    maven {
        url = 'https://global.repo.jmix.io/repository/public'
    }
}

dependencies {
    api platform("io.jmix.bom:jmix-bom:2.8.1")
    api 'io.jmix.core:jmix-core-starter'
    api 'io.jmix.data:jmix-eclipselink-starter'
    api 'org.assertj:assertj-core:3.24.2'
    api('org.springframework.boot:spring-boot-starter-test') {
        exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
    }
    implementation 'javax.annotation:javax.annotation-api:1.3.2'
    api 'com.tngtech.archunit:archunit-junit5:1.3.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.register('compileAll') {
    group = 'build'
    description = 'Compiles and enhances main sources.'
    dependsOn(tasks.named('classes'))
}

tasks.register('lint') {
    group = 'verification'
    description = 'No-op lint task — no static analysis configured for this module.'
}
