buildscript {
    repositories {
        gradlePluginPortal()
    }
    dependencies {
        classpath "com.diffplug.spotless:spotless-plugin-gradle:6.25.0"
    }
}

ext.jmixCompositeProjectRoot = true

apply plugin: 'base'
apply plugin: 'jacoco'
apply plugin: 'com.diffplug.spotless'

spotless {
    java {
        target '**/src/main/java/**/*.java', '**/src/test/java/**/*.java', '**/src/testFixtures/java/**/*.java'
        googleJavaFormat('1.17.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}


repositories {
    mavenCentral()
}

jacoco {
    toolVersion = "0.8.11"
}

def includedBuildTasks = { String taskName ->
    gradle.includedBuilds.collect { includedBuild ->
        includedBuild.task(":${taskName}")
    }
}

tasks.register('test') {
    description = 'Runs tests for all included builds'
    group = 'Verification'
    dependsOn(includedBuildTasks('test'))
}

tasks.named('check') {
    description = 'Runs tests, PMD, SpotBugs and aggregate JaCoCo coverage for all included builds'
    dependsOn(includedBuildTasks('check'))
    dependsOn(tasks.named('jacocoRootReport'))
    dependsOn(tasks.named('jacocoRootCoverageVerification'))
}

tasks.named('clean') {
    dependsOn(includedBuildTasks('clean'))
}

tasks.register('jacocoRootReport', JacocoReport) {
    description = 'Generates an aggregate JaCoCo coverage report for all composite builds'
    group = 'Verification'

    dependsOn(includedBuildTasks('test'))

    def reportRoots = providers.provider {
        gradle.includedBuilds.collect { it.projectDir } + [rootDir]
    }

    classDirectories.setFrom(reportRoots.map { roots ->
        files(roots.collect { reportRoot ->
            fileTree(reportRoot) {
                include '**/build/classes/java/main/**'
                exclude '**/autoconfigure/**'
                exclude '**/entity/**'
            }
        })
    })
    sourceDirectories.setFrom(reportRoots.map { roots ->
        files(roots.collect { reportRoot ->
            fileTree(reportRoot) {
                include '**/src/main/java/**'
            }
        })
    })
    executionData.setFrom(reportRoots.map { roots ->
        files(roots.collect { reportRoot ->
            fileTree(reportRoot) {
                include '**/build/jacoco/*.exec'
            }
        })
    })

    reports {
        xml.required = true
        html.required = true
        html.outputLocation = layout.buildDirectory.dir('reports/jacoco/rootReport/html')
        xml.outputLocation = layout.buildDirectory.file('reports/jacoco/rootReport/jacoco.xml')
    }

    mustRunAfter(tasks.matching { it.name.startsWith('spotless') })
}

tasks.register('jacocoRootCoverageVerification', JacocoCoverageVerification) {
    description = 'Verifies aggregate JaCoCo coverage for all composite builds'
    group = 'Verification'

    dependsOn(includedBuildTasks('test'))

    def reportRoots = providers.provider {
        gradle.includedBuilds.collect { it.projectDir } + [rootDir]
    }

    classDirectories.setFrom(reportRoots.map { roots ->
        files(roots.collect { reportRoot ->
            fileTree(reportRoot) {
                include '**/build/classes/java/main/**'
                exclude '**/autoconfigure/**'
                exclude '**/entity/**'
            }
        })
    })
    sourceDirectories.setFrom(reportRoots.map { roots ->
        files(roots.collect { reportRoot ->
            fileTree(reportRoot) {
                include '**/src/main/java/**'
            }
        })
    })
    executionData.setFrom(reportRoots.map { roots ->
        files(roots.collect { reportRoot ->
            fileTree(reportRoot) {
                include '**/build/jacoco/*.exec'
            }
        })
    })

    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.75
            }
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.60
            }
        }
    }

    mustRunAfter(tasks.matching { it.name.startsWith('spotless') })
    mustRunAfter(tasks.named('jacocoRootReport'))
}
