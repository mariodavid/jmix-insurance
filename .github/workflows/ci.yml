name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-verify:
    name: Build, Test & Verify
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Code Formatting Check (Spotless)
        run: |
          chmod +x ./gradlew
          ./gradlew spotlessJavaCheck

      - name: Compile & Jmix Enhance
        run: ./gradlew compileJava enhanceJmixMain

      - name: Static Analysis (PMD)
        run: ./gradlew pmdMain

      - name: Static Analysis (SpotBugs)
        run: ./gradlew spotbugsMain

      - name: Upload Static Analysis Reports (On Failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: static-analysis-reports
          path: |
            **/build/reports/pmd
            **/build/reports/spotbugs
            **/build/reports/spotless
          if-no-files-found: ignore

      - name: Run Tests & Generate Coverage Report
        run: ./gradlew test jacocoRootReport

      - name: Verify Code Coverage Thresholds
        run: ./gradlew jacocoRootCoverageVerification

      - name: Generate Coverage Summary Report
        if: always()
        run: python3 scripts/parse-coverage.py

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test
            **/build/test-results/test
          if-no-files-found: ignore

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: "**/build/reports/jacoco"
          if-no-files-found: ignore

      - name: Build Production JAR
        run: ./gradlew :webapp:bootJar -Pvaadin.productionMode=true

      - name: Upload Application JAR
        uses: actions/upload-artifact@v4
        with:
          name: webapp-jar
          path: webapp/build/libs/*.jar
          if-no-files-found: error

  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    needs: build-test-verify
    if: github.event_name == 'pull_request' && success()
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude PR Reviewer
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a senior developer performing a code review on this Pull Request.

            Instructions:
            1. Retrieve the list of changed files in this PR and their diff using standard git commands or `gh pr diff`.
            2. Scan the directory `.claude/skills/` to see available guidelines (Skills) in this repository.
            3. For each changed file, determine if it matches the scope of any available skills. If so, read their `SKILL.md` instructions using your file reading tools.
            
            Focus Areas:
            - Focus on SEMANTIC correctness, business logic bugs, transaction boundary robustness, exception handling, and edge cases.
            - Focus on TEST QUALITY (e.g., checking that tests verify actual logic and boundary conditions, have descriptive assertions, and perform proper cleanup).
            - Focus on UI/UX flow logical consistency and security design alignment.
            
            Static Analysis Exclusion Rule:
            - DO NOT report issues that are already covered by static analysis tools and automated tests in the project (such as ArchUnit rules in ArchitectureTest, PMD, Spotless formatting, or Spotbugs). For example, do not check for simple naming conventions, Lombok usage, file structure, or import boundary rules that the build itself already fails on.

            Reporting Rules:
            - Use `mcp__github_inline_comment__create_inline_comment` to add inline comments highlighting specific code issues. Do not pass `confirmed: true` so that comments are buffered and filtered through the Action's post-session classifier (which cleans up testing/probing comments).
            - Use `gh pr comment` to post a top-level review summary comment.
            - Only post GitHub comments - do not output the review as chat response messages.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob,LS"
