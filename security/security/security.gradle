archivesBaseName = 'security'

dependencies {
    api 'com.insurance:common-starter:0.0.1-SNAPSHOT'

    api 'io.jmix.data:jmix-eclipselink-starter'
    api 'io.jmix.security:jmix-security-starter'
    api 'io.jmix.security:jmix-security-data-starter'
    api 'io.jmix.security:jmix-security-flowui-starter'

    testImplementation('org.springframework.boot:spring-boot-starter-test') {
        exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
    }
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
    testFixturesApi 'org.assertj:assertj-core:3.24.2'
    testFixturesApi testFixtures('com.insurance:common:0.0.1-SNAPSHOT')

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'org.hsqldb:hsqldb'
}

configurations.implementation {
    exclude group: 'com.vaadin', module: 'hilla'
    exclude group: 'com.vaadin', module: 'hilla-dev'
    exclude group: 'com.vaadin', module: 'copilot'
}

test {
    useJUnitPlatform()
}
