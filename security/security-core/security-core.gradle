archivesBaseName = 'security-core'


dependencies {
    api project(':security-api')

    api 'io.jmix.data:jmix-eclipselink-starter'
    api 'io.jmix.security:jmix-security-starter'
    api 'io.jmix.security:jmix-security-data-starter'
    implementation 'io.jmix.core:jmix-core-starter'

    testImplementation('org.springframework.boot:spring-boot-starter-test') {
        exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
    }
    testImplementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'com.insurance.testsupport:test-support:0.0.1-SNAPSHOT'
    testFixturesApi 'org.assertj:assertj-core:3.24.2'
    testFixturesApi 'com.insurance.testsupport:test-support:0.0.1-SNAPSHOT'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'org.hsqldb:hsqldb'
}

test {
    useJUnitPlatform()
}
